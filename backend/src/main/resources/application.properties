# כתובת ה-JDBC הנקייה של Neon
# אם המשתנה NEON_DB_URL לא נמצא, Spring ישתמש בכתובת שרשומה אחרי הנקודתיים
spring.datasource.url=${NEON_DB_URL:jdbc:postgresql://ep-lingering-shadow-adsebopp-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${NEON_DB_USER}
spring.datasource.password=${NEON_DB_PASS}



# כתובות ה-frontend המורשות ל-CORS (מופרדות בפסיק). אפשר להגדיר כמה כתובות בבת אחת (dev + prod)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# פרטי הגישה של השרת
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# הגדרת הדרייבר (השארנו ללא שורת ה-database-platform הבעייתית)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# הגדרות Hibernate וריצה
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# batching של INSERT-ים - בלי זה saveAll() על רשימה גדולה (למשל אחרי ייבוא אקסל של
# מאות שורות) שולח כל שורה כ-round-trip נפרד ל-Neon, וזה איטי מאוד
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# פורט השרת
server.port=8080
